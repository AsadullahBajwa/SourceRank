<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SourceRank Trends</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      padding: 2rem;
      border-bottom: 1px solid #1e2530;
    }
    nav {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { color: #f8fafc; font-size: 2rem; margin-bottom: 0.4rem; }
    .subtle { color: #94a3b8; }
    main {
      padding: 1.5rem 2rem 3rem;
      display: grid;
      gap: 1.25rem;
    }
    .panel {
      background: #141923;
      border: 1px solid #263246;
      border-radius: 8px;
      overflow: hidden;
    }
    .panel h2 {
      padding: 1rem;
      border-bottom: 1px solid #263246;
      font-size: 1rem;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th, td { padding: 0.85rem 1rem; border-bottom: 1px solid #1e2530; text-align: left; }
    th { background: #182232; color: #94a3b8; }
    .bar {
      width: 180px;
      height: 8px;
      border-radius: 4px;
      background: #263246;
      overflow: hidden;
    }
    .bar span {
      display: block;
      height: 100%;
      background: #60a5fa;
    }
    .empty {
      padding: 2rem;
      color: #64748b;
      text-align: center;
    }
  </style>
</head>
<body>
<header>
  <nav>
    <a href="index.html">Leaderboard</a>
    <a href="methodology.html">Methodology</a>
    <a href="dispute.html">Dispute</a>
  </nav>
  <h1>Score Trends</h1>
  <p class="subtle">Weekly score snapshots generated by the local scorer.</p>
</header>

<main>
  <section class="panel">
    <h2>Snapshot History</h2>
    <div id="snapshots"></div>
  </section>
  <section class="panel">
    <h2>Latest Ranked Leaders</h2>
    <div id="leaders"></div>
  </section>
</main>

<script>
function table(headers, rows) {
  if (!rows.length) return '<div class="empty">No data available yet.</div>';
  return `
    <table>
      <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>`;
}

fetch('data/history/index.json')
  .then(r => r.ok ? r.json() : { snapshots: [] })
  .then(async history => {
    const snapshots = history.snapshots || [];
    const loaded = await Promise.all(snapshots.map(name =>
      fetch(`data/history/${name}`).then(r => r.json()).then(data => ({ name, data }))
    ));

    document.getElementById('snapshots').innerHTML = table(
      ['Snapshot', 'Generated', 'Tracked', 'Ranked'],
      loaded.map(({ name, data }) => {
        const journalists = data.journalists || [];
        const ranked = journalists.filter(j => j.eligible !== false).length;
        return `<tr><td>${name}</td><td>${data.generated_at || 'N/A'}</td><td>${journalists.length}</td><td>${ranked}</td></tr>`;
      })
    );

    const latest = loaded[loaded.length - 1]?.data;
    const leaders = (latest?.journalists || [])
      .filter(j => j.eligible !== false)
      .slice(0, 10);
    document.getElementById('leaders').innerHTML = table(
      ['Journalist', 'Score', 'Claims', 'Score Bar'],
      leaders.map(j => `
        <tr>
          <td><a href="journalist.html?handle=${encodeURIComponent(j.handle)}">@${j.handle}</a></td>
          <td>${j.score}</td>
          <td>${j.total_claims}</td>
          <td><div class="bar"><span style="width:${Math.max(0, Math.min(j.score, 100))}%"></span></div></td>
        </tr>`)
    );
  })
  .catch(() => {
    document.getElementById('snapshots').innerHTML = '<div class="empty">No snapshot index found.</div>';
    document.getElementById('leaders').innerHTML = '<div class="empty">Run the scorer to generate history.</div>';
  });
</script>
</body>
</html>
