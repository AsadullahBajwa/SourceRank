<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SourceRank</title>
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
    }
    h1 {
      font-size: 1rem;
      margin: 0 0 6px;
      color: #f8fafc;
    }
    p {
      margin: 0 0 12px;
      color: #94a3b8;
      line-height: 1.4;
      font-size: 0.82rem;
    }
    a, button {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #141923;
      color: #dbeafe;
      text-align: center;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }
    button {
      font: inherit;
    }
    #site-url {
      overflow-wrap: anywhere;
      color: #cbd5e1;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <h1>SourceRank Overlay</h1>
  <p>Active on X when visible handles match the leaderboard.</p>
  <p id="site-url">Loading...</p>
  <a id="open-leaderboard" href="#" target="_blank">Open Leaderboard</a>
  <button id="open-options">Options</button>
  <script src="popup.js"></script>
</body>
</html>
