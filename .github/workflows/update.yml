name: Static validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m py_compile config.py scheduler.py save_session.py find_handles.py scrapers/*.py pipeline/*.py scripts/*.py

      - name: Run regression tests
        run: python -m unittest discover -s tests -v

      - name: Validate static site artifacts
        run: python scripts/site_check.py
